<canvas id="road-canvas" width="480" height="220" style="border-radius:10px; width: 100%; height: auto; display: block; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1.5px solid rgba(232, 220, 200, 0.15);"></canvas>

<script>
  (function() {
    const canvas = document.getElementById('road-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    // Animation state
    let frame = 0;
    let stars = [];
    
    // Initialize stars once
    for (let i = 0; i < 25; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * 80,
        r: Math.random() * 1.5 + 0.5,
        alpha: Math.random(),
        speed: Math.random() * 0.02 + 0.01
      });
    }
    
    function draw() {
      frame++;
      
      // Clear canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 1. Draw Sunset Sky Gradient
      let skyGrad = ctx.createLinearGradient(0, 0, 0, 130);
      skyGrad.addColorStop(0, '#1e1b4b'); // Deep indigo
      skyGrad.addColorStop(0.5, '#4c1d95'); // Purple
      skyGrad.addColorStop(0.8, '#db2777'); // Pink
      skyGrad.addColorStop(1, '#f59e0b'); // Yellow/Sunset
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, 130);
      
      // 2. Draw Twinkling Stars
      stars.forEach(s => {
        s.alpha += s.speed;
        if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, s.alpha))})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      
      // 3. Draw Sunset Sun
      ctx.fillStyle = '#fef08a';
      ctx.beginPath();
      ctx.arc(380, 85, 26, 0, Math.PI, true);
      ctx.fill();
      
      // 4. Draw distant mountains/hills
      ctx.fillStyle = '#311042';
      ctx.beginPath();
      ctx.moveTo(0, 130);
      for (let x = 0; x <= canvas.width; x += 10) {
        let y = 110 + Math.sin(x * 0.01 + frame * 0.002) * 12 + Math.cos(x * 0.005) * 8;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(canvas.width, 220);
      ctx.lineTo(0, 220);
      ctx.closePath();
      ctx.fill();
      
      // Near hills
      ctx.fillStyle = '#1e293b';
      ctx.beginPath();
      ctx.moveTo(0, 130);
      for (let x = 0; x <= canvas.width; x += 10) {
        let y = 120 + Math.sin(x * 0.015 - frame * 0.003) * 8 + Math.cos(x * 0.008) * 6;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(canvas.width, 220);
      ctx.lineTo(0, 220);
      ctx.closePath();
      ctx.fill();

      // 5. Draw Road (Asphalt)
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.moveTo(180, 125);
      ctx.lineTo(300, 125);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();

      // 6. Draw Moving Road Center Dashed Lines (Speed illusion)
      ctx.strokeStyle = '#fef08a'; // Yellow lines
      ctx.lineWidth = 4;
      
      let numStripes = 8;
      let offset = (frame * 2.5) % 40;
      
      for (let i = 0; i < numStripes; i++) {
        let y1 = 125 + (i * 12) + (offset * (i / numStripes));
        let y2 = y1 + 6 + (i * 0.8);
        
        if (y1 > canvas.height) continue;
        
        // Calculate perspective x positions
        let x1 = 240 + (y1 - 125) * 0.8 * (0); 
        let x2 = 240 + (y2 - 125) * 0.8 * (0);
        
        ctx.beginPath();
        // Shift left/right slightly for center path
        let centerX1 = 240 + (y1 - 125) * 0.15;
        let centerX2 = 240 + (y2 - 125) * 0.15;
        
        ctx.moveTo(centerX1, y1);
        ctx.lineTo(centerX2, y2);
        ctx.stroke();
      }

      // 7. Draw road sides (solid lines)
      ctx.strokeStyle = '#94a3b8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(180, 125);
      ctx.lineTo(0, canvas.height);
      ctx.moveTo(300, 125);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.stroke();
      
      // 8. Draw bouncing car (silhouetted against sunset)
      ctx.save();
      let bounce = Math.sin(frame * 0.25) * 1.2;
      ctx.translate(130, 152 + bounce);
      
      // Car Body
      ctx.fillStyle = '#f43f5e'; // Red car body
      ctx.beginPath();
      ctx.roundRect(0, 10, 64, 18, 5);
      ctx.fill();
      
      // Car Cabin
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.moveTo(12, 10);
      ctx.lineTo(22, 0);
      ctx.lineTo(48, 0);
      ctx.lineTo(54, 10);
      ctx.closePath();
      ctx.fill();
      
      // Car Windows (glass reflection)
      ctx.fillStyle = '#38bdf8';
      ctx.beginPath();
      ctx.moveTo(24, 2);
      ctx.lineTo(34, 2);
      ctx.lineTo(34, 8);
      ctx.lineTo(24, 8);
      ctx.closePath();
      ctx.fill();
      
      ctx.beginPath();
      ctx.moveTo(37, 2);
      ctx.lineTo(45, 2);
      ctx.lineTo(47, 8);
      ctx.lineTo(37, 8);
      ctx.closePath();
      ctx.fill();
      
      // Wheels
      ctx.fillStyle = '#020617';
      ctx.beginPath();
      ctx.arc(14, 28, 8, 0, Math.PI * 2);
      ctx.arc(50, 28, 8, 0, Math.PI * 2);
      ctx.fill();
      
      // Wheel Hubs
      ctx.fillStyle = '#cbd5e1';
      ctx.beginPath();
      ctx.arc(14, 28, 3.5, 0, Math.PI * 2);
      ctx.arc(50, 28, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Tail Light Glow
      let glow = Math.sin(frame * 0.1) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(239, 68, 68, ${glow})`;
      ctx.beginPath();
      ctx.arc(0, 15, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
      
      requestAnimationFrame(draw);
    }
    
    // Start loop
    draw();
  })();
</script>
