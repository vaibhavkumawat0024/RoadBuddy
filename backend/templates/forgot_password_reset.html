{% extends "base.html" %}
{% block title %}Verify Reset Code — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Verify Reset Code</h1>
  <p class="subtitle">Enter the verification code sent to {{ email }} and your new password</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/forgot-password/reset" id="reset-form">
    <input type="hidden" name="email" value="{{ email }}">

    <label for="otp">Verification OTP</label>
    <input type="text" id="otp" name="otp" required placeholder="Enter 6-digit OTP" maxlength="6" style="letter-spacing: 2px; font-size: 16px; text-align: center;">

    <label for="new_password">New Password</label>
    <div style="position: relative; width: 100%;">
      <input type="password" id="new_password" name="new_password" required placeholder="Minimum 8 characters" minlength="8" style="width: 100%; padding-right: 40px;">
      <button type="button" id="toggle-new-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; outline: none;" aria-label="Toggle Password Visibility">👁️</button>
    </div>

    <label for="confirm_password" style="margin-top: 16px; display: block;">Confirm New Password</label>
    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Re-enter new password" minlength="8">
    <p id="password-match-error" style="display: none; color: #ef4444; font-size: 12px; margin-top: 4px; font-weight: 600;"></p>

    <button type="submit" id="submit-btn" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; width: 100%;">
      <span class="btn-text">Reset Password</span>
      <span class="btn-loader" style="display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite;"></span>
    </button>
  </form>

  <p style="margin-top: 20px; text-align: center;"><a href="/forgot-password" style="color: var(--primary); text-decoration: none; font-weight: 600;">Resend OTP</a></p>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const newPasswordInput = document.getElementById("new_password");
    const confirmPasswordInput = document.getElementById("confirm_password");
    const toggleNewBtn = document.getElementById("toggle-new-password");
    const resetForm = document.getElementById("reset-form");
    const submitBtn = document.getElementById("submit-btn");
    const btnText = submitBtn.querySelector(".btn-text");
    const btnLoader = submitBtn.querySelector(".btn-loader");
    const matchError = document.getElementById("password-match-error");

    if (toggleNewBtn && newPasswordInput) {
      toggleNewBtn.addEventListener("click", () => {
        const type = newPasswordInput.getAttribute("type") === "password" ? "text" : "password";
        newPasswordInput.setAttribute("type", type);
        confirmPasswordInput.setAttribute("type", type);
        toggleNewBtn.textContent = type === "password" ? "👁️" : "🙈";
      });
    }

    if (resetForm && submitBtn) {
      resetForm.addEventListener("submit", (e) => {
        if (newPasswordInput.value !== confirmPasswordInput.value) {
          e.preventDefault();
          matchError.textContent = "✗ Passwords do not match!";
          matchError.style.display = "block";
          return;
        }
        matchError.style.display = "none";
        submitBtn.disabled = true;
        btnText.textContent = "Resetting...";
        btnLoader.style.display = "inline-block";
      });
    }
  });
</script>
{% endblock %}
