{% extends "base.html" %}
{% block title %}Register — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Create account</h1>
  <p class="subtitle">Join RoadBuddy and start planning trips</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/register" id="register-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Your full name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">

    <label for="password">Password</label>
    <div style="position: relative; width: 100%;">
      <input type="password" id="password" name="password" required placeholder="Min 8 characters" minlength="8" style="width: 100%; padding-right: 40px;">
      <span id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 14px; user-select: none;" aria-label="Toggle Password Visibility">👁️</span>
    </div>

    <button type="submit" id="submit-btn" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px;">
      <span class="btn-text">Send OTP & Continue</span>
      <span class="btn-loader" style="display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite;"></span>
    </button>
  </form>

  <p>Already have an account? <a href="/login">Login here</a></p>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const passwordInput = document.getElementById("password");
    const toggleBtn = document.getElementById("toggle-password");
    const registerForm = document.getElementById("register-form");
    const submitBtn = document.getElementById("submit-btn");
    const btnText = submitBtn.querySelector(".btn-text");
    const btnLoader = submitBtn.querySelector(".btn-loader");

    if (toggleBtn && passwordInput) {
      toggleBtn.addEventListener("click", () => {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        toggleBtn.textContent = type === "password" ? "👁️" : "🙈";
      });
    }

    if (registerForm && submitBtn) {
      registerForm.addEventListener("submit", () => {
        submitBtn.disabled = true;
        btnText.textContent = "Sending OTP...";
        btnLoader.style.display = "inline-block";
      });
    }
  });
</script>
{% endblock %}
