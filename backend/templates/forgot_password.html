{% extends "base.html" %}
{% block title %}Forgot Password — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Reset Password</h1>
  <p class="subtitle">Enter your registered email address to receive a reset verification OTP code</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/forgot-password" id="forgot-form">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">
    <button type="submit" id="submit-btn" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span class="btn-text">Send OTP</span>
      <span class="btn-loader" style="display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite;"></span>
    </button>
  </form>

  <p style="margin-top: 20px; text-align: center;"><a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Back to Login</a></p>
</div>

<style>
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const forgotForm = document.getElementById("forgot-form");
    const submitBtn = document.getElementById("submit-btn");
    const btnText = submitBtn.querySelector(".btn-text");
    const btnLoader = submitBtn.querySelector(".btn-loader");

    if (forgotForm && submitBtn) {
      forgotForm.addEventListener("submit", () => {
        submitBtn.disabled = true;
        btnText.textContent = "Sending OTP...";
        btnLoader.style.display = "inline-block";
      });
    }
  });
</script>
{% endblock %}
