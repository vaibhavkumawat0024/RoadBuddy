{% extends "base.html" %}
{% block title %}Forgot Password — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Reset Password</h1>
  <p class="subtitle">Enter your registered email address to receive a reset verification OTP code</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/forgot-password">
    <label>Email Address</label>
    <input type="email" name="email" required placeholder="you@example.com">
    <button type="submit">Send OTP</button>
  </form>

  <p style="margin-top: 20px; text-align: center;"><a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Back to Login</a></p>
</div>
{% endblock %}
