{% extends "base.html" %}
{% block title %}Login — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Welcome back</h1>
  <p class="subtitle">Login to your RoadBuddy account</p>

  {% if success %}
    <p class="success">{{ success }}</p>
  {% endif %}

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" required placeholder="you@example.com">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; margin-bottom: 6px;">
      <label style="margin: 0; text-transform: uppercase;">Password</label>
      <a href="/forgot-password" style="font-size: 12px; font-weight: 600; text-decoration: none; color: var(--primary);">Forgot Password?</a>
    </div>
    <input type="password" name="password" required placeholder="••••••••" style="margin-top: 0;">

    <button type="submit">Login</button>
  </form>

  <p>Don't have an account? <a href="/register">Register here</a></p>
</div>
{% endblock %}
