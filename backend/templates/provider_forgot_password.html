{% extends "provider_base.html" %}
{% block title %}Partner Reset Password — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card provider-auth">
  <div class="auth-logo">🚐</div>
  <h1>Partner Reset Password</h1>
  <p class="subtitle">Enter your registered email address to receive an OTP</p>

  {% if error %}
    <p class="error" style="color: #ef4444; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 16px;">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/provider/forgot-password">
    <label for="email" style="color: #a0a0c0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="you@company.com" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; font-size: 13.5px; margin-top: 6px; margin-bottom: 16px;">
    
    <button type="submit" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF6B35, #FF8F5E); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s;">Send OTP</button>
  </form>

  <p style="margin-top: 20px; text-align: center;"><a href="/provider/login" style="color: #FF6B35; text-decoration: none; font-weight: 600; font-size: 13px;">Back to Login</a></p>
</div>
{% endblock %}
