<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Station Login — RoadBuddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #0f2340 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
    h1 { color: #fff; font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .subtitle { color: rgba(255,255,255,0.45); font-size: 13px; text-align: center; margin-bottom: 28px; }
    label { display: block; color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 18px; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #22c55e; background: rgba(255,255,255,0.09); }
    input::placeholder { color: rgba(255,255,255,0.25); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px; opacity: 0.5;
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    button[type="submit"]:hover { opacity: 0.92; transform: translateY(-1px); }
    button[type="submit"]:active { transform: scale(0.98); }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.35); }
    .footer a { color: #22c55e; font-weight: 600; text-decoration: none; }
    .error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    .success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    .badge { display: inline-block; background: rgba(34,197,94,0.15); color: #86efac; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(34,197,94,0.25); margin-left: 8px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⛽</div>
    <h1>Fuel Station Login <span class="badge">Operator</span></h1>
    <p class="subtitle">Access your fuel availability dashboard</p>

    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}<div class="success">{{ success }}</div>{% endif %}

    <form method="POST" action="/fuel-operator/login">
      <label for="email">Gmail / Email</label>
      <input type="email" id="email" name="email" placeholder="e.g. operator@gmail.com" required />

      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" name="password" placeholder="Your password" required />
        <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
      </div>

      <button type="submit">Login to Dashboard</button>
    </form>

    <div class="footer">
      <p>New station? <a href="/fuel-operator/register">Register here</a></p>
    </div>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.querySelector('.toggle-pw');
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    }
  </script>
</body>
</html>
