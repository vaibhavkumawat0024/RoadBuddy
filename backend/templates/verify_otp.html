{% extends "base.html" %}
{% block title %}Verify OTP — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Verify your email</h1>
  <p class="subtitle">Enter the OTP sent to <strong>{{ email }}</strong></p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/verify-otp">
    <input type="hidden" name="email" value="{{ email }}">

    <label>Enter OTP</label>
    <input type="text" name="otp" required placeholder="Enter verification code"
           maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <p style="font-size: 12px; color: #7878a0; margin-top: 4px; margin-bottom: 12px;">(For testing, enter default OTP: <strong>1234</strong>)</p>

    <button type="submit">Verify & Create Account</button>
  </form>

  <p>Wrong email? <a href="/register">Go back</a></p>
</div>
{% endblock %}
