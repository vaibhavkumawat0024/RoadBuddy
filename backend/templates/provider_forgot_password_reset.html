{% extends "provider_base.html" %}
{% block title %}Partner Verify OTP — RoadBuddy{% endblock %}

{% block content %}
<div class="auth-card provider-auth">
  <div class="auth-logo">✓</div>
  <h1>Verify Partner OTP</h1>
  <p class="subtitle">Enter the verification code sent to {{ email }} and your new password</p>

  {% if error %}
    <p class="error" style="color: #ef4444; background: rgba(239,68,68,0.1); padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 16px;">{{ error }}</p>
  {% endif %}

  <form method="POST" action="/provider/forgot-password/reset">
    <input type="hidden" name="email" value="{{ email }}">

    <label style="color: #a0a0c0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Verification OTP</label>
    <input type="text" name="otp" required placeholder="Enter OTP" maxlength="6" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; font-size: 16px; letter-spacing: 2px; text-align: center; margin-top: 6px; margin-bottom: 16px;">

    <label style="color: #a0a0c0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">New Password</label>
    <input type="password" name="new_password" required placeholder="Minimum 8 characters" minlength="8" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; outline: none; font-size: 13.5px; margin-top: 6px; margin-bottom: 16px;">

    <button type="submit" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #FF6B35, #FF8F5E); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s;">Reset Password</button>
  </form>

  <p style="margin-top: 20px; text-align: center;"><a href="/provider/forgot-password" style="color: #FF6B35; text-decoration: none; font-weight: 600; font-size: 13px;">Resend OTP</a></p>
</div>
{% endblock %}
