- name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi httpx  # Add any other backend packages you need here

      # This runs pytest while telling GitHub to look inside the backend directory
      - name: Run tests
        run: |
          export PYTHONPATH=backend
          python -m pytest -v