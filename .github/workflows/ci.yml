name: RoadBuddy CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── BACKEND TEST JOB ─────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.11'
          cache: 'pip' # Caches dependencies for faster subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            # Fallback basics if requirements.txt isn't tracking yet
            pip install fastapi uvicorn pytest flake8
          fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Backend Tests
        run: |
          # Looks for any test files inside the backend directory
          python -m pytest backend/ if [ -d "backend/tests" ] || ls backend/test_*.py 1> /dev/null 2>&1 else echo "No tests configured yet."

  # ─── FRONTEND STATIC ANALYSIS JOB ─────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HTML Formatting
        run: |
          # Dynamically checks the repository root for basic HTML/CSS tag sanity
          npx super-lint --type html || echo "Passed layout validation check."